<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Issue Tracker | Home</title>
    <link rel="shortcut icon" href="./assets/github-logo.png" type="image/x-icon">

    <!-- Tailwind $ daisyUI -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- font awesome  -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />

    <style>
        @media screen and (max-width: 572px) {
            #logoText {
                display: none;
            }
        }
    </style>
</head>

<body>
    <header class="w-[95%] mx-auto">
        <div class="navbar bg-base-100 shadow-sm flex justify-between">
            <div class="flex-1 flex items-center gap-1">
                <div class="w-[36px] h-[36px]"><img src="./assets/github-logo.png" alt="">
                </div>
                <h3 id="logoText" class="text-xl font-bold">GitHub Issues Tracker</h3>

            </div>
            <div class="flex gap-2">
                <input id="searchInput" type="text" placeholder="Search Issues"
                    class="input input-bordered max-w-[300px] md:w-auto" />
                <div class="dropdown dropdown-end">
                    <button id="btn-search" class="btn btn-primary w-full">Search</button>
                </div>
            </div>
    </header>
    <main>
        <!-- tab section  -->
        <section id="tabs" class="max-w-[93%] mx-auto mt-7 p-4 shadow-md">
            <button id="allTab" class="btn btn-primary">All</button>
            <button id="openTab" class="btn ">Open</button>
            <button id="closedTab" class="btn">Close</button>
        </section>
        <!-- spinner section -->

        <section class="max-w-[93%] mx-auto mt-6 p-3 shadow-md flex justify-between items-center">
            <div class="flex justify-center items-center gap-1">
                <div class="p-3 rounded-full shadow-md"><img src="./assets/Aperture.png" alt=""></div>
                <div class="space-y-1">
                    <h2 class="text-2xl font-bold"><span id="count"></span> Issues</h2>
                    <p class="text-[#64748b] ">Track and manage your project issues</p>
                </div>
            </div>
            <div>
                <span class="font-semibold"><span class="text-green-400 text-xs"><i
                            class="fa-solid fa-circle"></i></span> Open</span>
                <span class="font-semibold"><span class="text-[#A855F7] text-xs"><i class="fa-solid fa-circle"></i>
                    </span>Closed</span>
            </div>
        </section>

        <div id="spinner" class="h-[60vh] flex justify-center items-center">
            <span class="loading loading-spinner loading-xs"></span>
            <span class="loading loading-spinner loading-sm"></span>
            <span class="loading loading-spinner loading-md"></span>
            <span class="loading loading-spinner loading-lg"></span>
            <span class="loading loading-spinner loading-xl"></span>
        </div>

        <!-- issues container -->
        <section id="issuesContainer"
            class="max-w-[93%] mx-auto mt-7 shadow-md grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-2">
            <div id="card-container">

            </div>
        </section>
        <dialog id="my_modal_5" class="modal modal-bottom sm:modal-middle">
            <div class="modal-box">
                <div id="details-container" class="space-y-4">

                </div>
                <div class="modal-action">
                    <form method="dialog">
                        <!-- if there is a button in form, it will close the modal -->
                        <button id="" class="btn btn-primary border-none
                        ">Close</button>
                    </form>
                </div>
            </div>
        </dialog>
    </main>

  

    <script src="./script/home.js"></script>
</body>

</html>

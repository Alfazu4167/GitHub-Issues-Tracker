<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Issues Tracker</title>
    <link rel="shortcut icon" href="./assets/github-logo.png" type="image/x-icon">
    <!-- Tailwind $ daisyUI -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>


    <!-- font awesome cdn -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <!-- google font  -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">

    <style>
        * {
            font-family: "Geist", sans-serif;
        }
    </style>
</head>

<body class="min-h-screen max-w-md mx-auto shadow-2xl rounded-md">
    <section>
        <div class="p-8 space-y-4">

            <img src="./assets/github-logo.png" alt="" class="mx-auto">

            <h2 class="text-3xl font-bold text-[#1f2937] text-center">GitHub Issues Tracker</h2>
            <p class="text-[#64748b] text-center">Sign in to manage your issues</p>
        </div>
    </section>

    <!-- sign in section  -->
    <div class="pt-10 ">
        <div class="card bg-base-100 w-full max-w-sm shrink-0 shadow mx-auto">
            <div class="card-body">
                <fieldset class="fieldset">
                    <label class="label font-bold text-[#1f2937]">Username</label>
                    <input id="singIn-input" type="text"
                        class="input rounded-sm bg-base-100" placeholder="Enter username" />
                    <label class="label font-bold text-[#1f2937]">Password</label>
                    <input id="password-input" type="password" class="input rounded-sm bg-base-100"
                        placeholder="Enter password" />

                    <button id="singin-btn" class="btn btn-primary rounded-full mt-4">Sign In</button>
                </fieldset>
            </div>
        </div>
    </div>

    <script src="./script/login.js"></script>
</body>

</html>
